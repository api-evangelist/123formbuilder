aid: 123formbuilder
name: 123FormBuilder
description: >-
  123FormBuilder is an online form, survey, and workflow builder used to
  collect, route, and integrate submission data across websites, customer
  portals, and back-office systems with no-code design and HIPAA-ready
  configurations. The 123FormBuilder REST API v2 enables programmatic
  access to forms, submissions, fields, and users for export and integration
  scenarios. Authentication uses an API key, with OAuth 2.0 authorization code
  flow available for multi-user apps.
