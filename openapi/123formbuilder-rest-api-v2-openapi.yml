                  description: The password associated with the account
                password_repeat:
                  type: string
                  description: Password repeat
                plan:
                  type: string
                  description: 'The service plan of the account: 0 - Free (default value), 1 - Gold, 2 - Platinum, 3 - Diamond.
                    In order to be able to assign a plan, you need additional permissions.'
                company_name:
                  type: string
                  description: The company name associated with the account
              required:
              - JWT
              - email
              - password
              - password_repeat
components:
  securitySchemes:
    JWTQuery:
      type: apiKey
      in: query
      name: JWT
      description: JWT token obtained from POST /token, supplied as the JWT query parameter.
  schemas:
    FormWithFields:
      type: object
      properties:
        id:
          type: integer
          description: Form details
        name:
          type: string
          description: Form name
        group_id:
          type: integer
          description: The ID of the group to which the form belongs
        user_id:
          type: integer
          description: The ID of the form owner
        submissions_count:
          type: integer
          description: The total number of submissions sent on the form
        submissions_count_month:
          type: integer
          description: The number of submissions sent on the form in the current month
        latest_submission:
          type: object
          properties:
            id:
              type: integer
              description: The ID of the last submission on the form
            date:
              type: string
              format: date-time
              description: The datetime of the last submission on the form
        created_by:
          type: integer
          description: The ID of the user who created the form
        controls:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Control'
    Control:
      type: object
      properties:
        id:
          type: integer
          description: The Field ID
        form_id:
          type: integer
          description: The form ID
        name:
          type: string
          description: The label of the field
        instruction:
          type: string
          description: The instructions displayed below the label (empty by default)
        position:
          type: integer
          description: The position of the field in the form (numeric)
        type:
          type: integer
          description: The type of the field (numeric)
        subtype:
          type: integer
          description: The subtype of the field (numeric)
        required:
          type: integer
          description: Specifies whether a field is required or not (accepts only 0 - not required or 1 - required; default
            is 0).
        values:
          type: string
          description: This is used for radio buttons, checkboxes and dropdown lists and contains the options available in
            the choice field.
        hidden:
          type: integer
          description: Specifies the field visibility (accepts only 0 - visible or 1 - hidden; default is 0).
        other_value:
          type: integer
          description: This is used for radio buttons and checkboxes. If it is set to 1, then an additional input is displayed,
            where users can enter a different value.
        hide_label:
          type: integer
          description: Specifies the label visibility (accepts only 0 - visible or 1 - hidden; default is 0).
        validation:
          type: integer
          description: Speficies the validation type for an input (default is 0 - numeric).
        width:
          type: integer
          description: Specifies the width of the field in percentage (default is 100%).
        height:
          type: integer
          description: Specifies the heigth of the field in pixels (default is 0 - auto).
    Form:
      type: object
      properties:
        id:
          type: integer
          description: Form details
        name:
          type: string
          description: Form name
        group_id:
          type: integer
          description: The group to which the form belongs
        user_id:
          type: integer
          description: The ID of the form owner
        submissions_count:
          type: integer
          description: The total number of submissions sent on the form
        submissions_count_month:
          type: integer
          description: The number of submissions sent on the form in the current month
        latest_submission:
          type: object
          properties:
            date:
              type: string
              format: date-time
              description: The datetime of the last submission on the form
            id:
              type: integer
              description: The ID of the last submission on the form
        created_by:
          type: integer
          description: The ID of the subuser who created the form
        active:
          type: integer
          description: The form activity status
        active_date_from:
          type: string
          format: date
          description: This value is returned only when activity status is 1.
        active_date_to:
          type: string
          format: date
          description: This value is returned only when activity status is 1.
        active_days:
          type: string
          description: This value is returned only when activity status is 4.
    Group:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the group
        name:
          type: string
          description: The name of the group
        webhook_url:
          type: string
          description: The URL of the WebHook attached to the group
        parent_id:
          type: integer
          description: The ID of the parent group
    GroupWithForms:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the group
        webhook_url:
          type: string
          description: The URL of the WebHook attached to the group
        parent_id:
          type: integer
          description: The ID of the parent group
        forms:
          type: array
          items:
            $ref: '#/components/schemas/Form'
    User:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the subuser
        name:
          type: string
          description: The username of the subuser
        email:
          type: string
          description: The email address of the subuser
        user_parent:
          type: integer
          description: The ID of the parent user
        admin:
          type: integer
        allow_create_form:
          type: integer
          description: Indicates if the subuser can create new forms.
        allow_duplicate_form:
          type: integer
          description: Indicates if the subuser can duplicate new forms.
        allow_delete_form:
          type: integer
          description: Indicates if the subuser can delete new forms.
        permissions:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AdminPermissions'
    AdminPermissions:
      type: object
      properties:
        can_manage_groups:
          type: integer
          description: Indicates if the admin subuser can manage groups.
        can_manage_users:
          type: integer
          description: Indicates if the admin subuser can manage users.
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              description: Details about the error
            status_code:
              type: integer
              description: The status code of the request
    FormUpdateValidationError:
      type: object
      properties:
        name:
          type: array
          items:
            enum:
            - The name field is required when none of group id / email are present.
        group_id:
          type: array
          items:
            enum:
            - The group id field is required when none of name / email are present.
    FormCreateValidationError:
      type: object
      properties:
        name:
          type: array
          items:
            enum:
            - The name field is required.
        group_id:
          type: array
          items:
            enum:
            - The group id must be an integer.
    GroupCreateValidationError:
      type: object
      properties:
        name:
          type: array
          items:
            enum:
            - The name field is required.
        webhook_url:
          type: array
          items:
            enum:
            - The webhook url is not a valid URL.
    GroupUpdateValidationError:
      type: object
      properties:
        name:
          type: array
          items:
            enum:
            - The name field is required when webhook url is not present.
        webhook_url:
          type: array
          items:
            enum:
            - The webhook url field is required when name is not present.
    UsersCreateValidationError:
      type: object
      properties:
        password:
          type: array
          items:
            enum:
            - The password field is required when passhash is not present.
        passhash:
          type: array
          items:
            enum:
            - The passhash field is required when password is not present.
        email:
          type: array
          items:
            enum:
            - The email field is required.
    Submission:
      type: object
      properties:
        id:
          type: integer
          description: Submission ID
        form_id:
          type: integer
          description: Form ID
        entry_id:
          type: integer
          description: Entry ID of the submission
        country:
          type: string
          description: Two-letter country code
        deleted:
          type: integer
          description: Shows if the submission was deleted.
        status:
          type: integer
          description: Submission status
        payed:
          type: integer
          description: Payment status (for forms with payment integration)
        approved:
          type: integer
          description: Shows if the submission was approved.
        date:
          type: string
          description: The date when the submission was made.
        content:
          type: string
          description: JSON with all of the submission fields
        recipients:
          type: object
          description: Submission recipients
security:
- JWTQuery: []
